name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  foundation:
    name: Foundation quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Configure isolated data directory
        run: echo "MUSICOLOGY_DATA_DIR=$RUNNER_TEMP/musicology-data" >> "$GITHUB_ENV"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          package-manager-cache: false

      - name: Enable pinned pnpm
        run: |
          corepack enable
          corepack install

      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile

      - name: Run aggregate quality gate
        run: pnpm quality

      - name: Migrate empty temporary database
        run: pnpm db:migrate --json

      - name: Validate migrated temporary database
        run: pnpm db:status --json
